spring.application.name=SpringDataRest
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/miola
spring.datasource.username=${MYSQL_USER:sa}
spring.datasource.password=${MYSQL_PASSWORD:azerty}
spring.jpa.hibernate.ddl-auto=update
server.port=8082
spring.data.rest.base-path=/api

# Spring AI - Ollama Configuration
spring.ai.ollama.base-url=http://${OLLAMA_HOST:localhost}:${OLLAMA_PORT:11434}
spring.ai.ollama.chat.options.model=mistral

# Actuator (for Kubernetes health probes)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
