apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-app
  namespace: voiture-app
  labels:
    app: springboot-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springboot-app
  template:
    metadata:
      labels:
        app: springboot-app
    spec:
      containers:
        - name: springboot
          image: springboot-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MYSQL_PORT
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MYSQL_PASSWORD
            - name: OLLAMA_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OLLAMA_HOST
            - name: OLLAMA_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: OLLAMA_PORT
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: springboot-app
  namespace: voiture-app
spec:
  selector:
    app: springboot-app
  ports:
    - port: 8082
      targetPort: 8082
  type: ClusterIP
