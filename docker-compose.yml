services:
  mysqldb:
    image: mysql
    container_name: mysqldb
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: miola
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - spring-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - spring-net
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ollama-pull:
    image: ollama/ollama
    container_name: ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - spring-net
    entrypoint: ["sh", "-c", "ollama pull mistral"]
    environment:
      OLLAMA_HOST: ollama:11434

  springboot-app:
    build: ./SpringDataRest back end
    container_name: springboot-app
    restart: always
    ports:
      - "9090:8082"
    environment:
      MYSQL_HOST: mysqldb
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_PORT: 3306
      OLLAMA_HOST: ollama
      OLLAMA_PORT: 11434
    depends_on:
      mysqldb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - spring-net

  react-frontend:
    build: ./Spring front-end/reactjs
    container_name: react-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - springboot-app
    networks:
      - spring-net

volumes:
  mysql-data:
  ollama-data:

networks:
  spring-net:
